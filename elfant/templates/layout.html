<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elfant – {% block title %}Sleeper League Explorer{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    header { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 0; }
    header .container { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header h1 a { color: #38bdf8; text-decoration: none; }
    header nav a { color: #94a3b8; margin-left: 1.5rem; text-decoration: none; font-size: 0.9rem; }
    header nav a:hover { color: #38bdf8; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #f1f5f9; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid #334155; font-size: 0.9rem; }
    th { color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    tr:hover td { background: #0f172a40; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: #065f4620; color: #34d399; border: 1px solid #065f46; }
    .badge-yellow { background: #854d0e20; color: #fbbf24; border: 1px solid #854d0e; }
    .badge-blue { background: #1e3a5f20; color: #60a5fa; border: 1px solid #1e3a5f; }
    .badge-red { background: #7f1d1d20; color: #f87171; border: 1px solid #7f1d1d; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.4rem; color: #94a3b8; font-size: 0.85rem; font-weight: 500; }
    input[type="text"], select { width: 100%; padding: 0.65rem; background: #0f172a; border: 1px solid #334155; border-radius: 0.375rem; color: #e2e8f0; font-size: 0.95rem; }
    input[type="text"]:focus { outline: none; border-color: #38bdf8; }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border-radius: 0.375rem; font-size: 0.85rem; font-weight: 600; border: none; cursor: pointer; text-decoration: none; }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-outline { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; }
    .btn-outline:hover { background: #38bdf820; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .flex { display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat { flex: 1; min-width: 120px; text-align: center; padding: 1rem; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: #38bdf8; }
    .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-4 { margin-top: 1rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .text-muted { color: #64748b; }
    .text-sm { font-size: 0.85rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    .loading { opacity: 0.5; }
    .alert { padding: 0.8rem 1rem; border-radius: 0.375rem; margin-bottom: 1rem; font-size: 0.9rem; }
    .alert-info { background: #1e3a5f; border: 1px solid #1e3a5f; color: #93c5fd; }
    .align-right { text-align: right; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/">elfant</a></h1>
      <nav>
        <a href="/">Home</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
