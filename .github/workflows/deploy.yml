name: Deploy elfant

on:
  push:
    branches: [master]
    paths:
      - 'elfant/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push --all-tags $IMAGE

      - name: Deploy to k3s
        run: |
          kubectl set image deployment/elfant -n elfant \
            app=ghcr.io/${{ github.repository }}:${{ github.sha }}
          kubectl rollout status deployment/elfant -n elfant --timeout=120s
