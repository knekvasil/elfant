name: Deploy elfant

on:
  push:
    branches: [master]
    paths:
      - 'elfant/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:latest
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.1.206
          username: kaj
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            kubectl set image deployment/elfant -n elfant \
              app=ghcr.io/${{ github.repository }}:${{ github.sha }}
            kubectl rollout status deployment/elfant -n elfant --timeout=120s
