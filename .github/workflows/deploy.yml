name: Deploy elfant

on:
  push:
    branches: [master]
    paths:
      - '.github/**'
      - '.github/**'
      - 'elfant/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'frontend/**'
      - 'alembic/**'
      - 'alembic.ini'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push --all-tags $IMAGE

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Deploy to k3s
        run: |
          kubectl set image deployment/elfant -n elfant \
            app=ghcr.io/${{ github.repository }}:${{ github.sha }}
          kubectl rollout status deployment/elfant -n elfant --timeout=120s

      - name: Run database migrations
        run: |
          kubectl exec deployment/elfant -n elfant -- \
            python -m alembic upgrade head
